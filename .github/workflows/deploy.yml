name: Deploy App and Firmware Files to Server

on:
  push:
    branches: [main]
    paths:
      - "source/**"
      - "firmware/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect deployable files
        id: detect_files
        run: |
          shopt -s nullglob
          app_files=(source/*.py)
          fw_files=(firmware/*.bin)
          app_count=${#app_files[@]}
          fw_count=${#fw_files[@]}

          if [ "$app_count" -gt 0 ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$fw_count" -gt 0 ]; then
            echo "has_fw=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_fw=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Detected $app_count app files and $fw_count firmware files."

      - name: Copy app files via SCP
        if: steps.detect_files.outputs.has_app == 'true'
        uses: appleboy/scp-action@master
        with:
          host: 34.53.103.114
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "source/*.py"
          target: "~/micro-bilal-deploy/app/"
          strip_components: 1

      - name: Copy firmware files via SCP
        if: steps.detect_files.outputs.has_fw == 'true'
        uses: appleboy/scp-action@master
        with:
          host: 34.53.103.114
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "firmware/*.bin"
          target: "~/micro-bilal-deploy/firmware/"
          strip_components: 1

      - name: Move files and set permissions
        if: steps.detect_files.outputs.has_app == 'true' || steps.detect_files.outputs.has_fw == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: 34.53.103.114
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Deploy app files if present.
            if ls ~/micro-bilal-deploy/app/*.py > /dev/null 2>&1; then
              sudo mkdir -p /var/www/html/app
              sudo cp ~/micro-bilal-deploy/app/*.py /var/www/html/app/
              sudo chmod 644 /var/www/html/app/*.py
              sudo chown www-data:www-data /var/www/html/app/*.py
            fi

            # Deploy firmware files if present.
            if ls ~/micro-bilal-deploy/firmware/*.bin > /dev/null 2>&1; then
              sudo mkdir -p /var/www/html/firmware
              sudo cp ~/micro-bilal-deploy/firmware/*.bin /var/www/html/firmware/
              sudo chmod 644 /var/www/html/firmware/*.bin
              sudo chown www-data:www-data /var/www/html/firmware/*.bin
            fi

            # Cleanup temp directory
            rm -rf ~/micro-bilal-deploy
